name: Build & Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  schedule:
    # Rebuild every 6 hours to pick up fresh pre-owned listings
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      generate_content:
        description: 'Run DeepSeek content generation'
        type: boolean
        default: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Optional: regenerate AI content (only when manually triggered with flag)
      - name: Setup Python
        if: github.event.inputs.generate_content == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        if: github.event.inputs.generate_content == 'true'
        run: pip install requests python-dotenv

      - name: Generate content with DeepSeek
        if: github.event.inputs.generate_content == 'true'
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          python scripts/generate_content.py --mode brands
          python scripts/generate_content.py --mode reviews

      - name: Build Next.js site
        run: npm run build
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: microbrand-hub
          directory: out
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
